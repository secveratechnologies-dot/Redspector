version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: redspecter_iam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  iam-service:
    build:
      context: ./iam_service
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=RedSpecter IAM Service
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=redspecter_iam
    volumes:
      - ./iam_service/app:/app/app
      - ./iam_service/alembic.ini:/app/alembic.ini
      - ./iam_service/alembic:/app/alembic
    depends_on:
      - postgres

volumes:
  postgres_data:
