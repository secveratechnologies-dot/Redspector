worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend upstream definitions
    upstream iam {
        server iam-service:8000;
    }

    upstream asset {
        server asset-service:8001;
    }

    upstream threat {
        server threat-service:8002;
    }

    server {
        listen 80;
        server_name localhost;

        # IAM Service Endpoints
        location /api/v1/users/ {
            proxy_pass http://iam/api/v1/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/tenants/ {
            proxy_pass http://iam/api/v1/tenants/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /auth/ {
            proxy_pass http://iam/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Asset Service Endpoints
        location /api/v1/assets/ {
            proxy_pass http://asset/api/v1/assets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Threat Service Endpoints
        location /api/v1/threats/ {
            proxy_pass http://threat/api/v1/threats/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default fallback (could serve frontend in future)
        location / {
            return 200 "RedSpectre API Gateway Online\n";
            add_header Content-Type text/plain;
        }
    }
}
