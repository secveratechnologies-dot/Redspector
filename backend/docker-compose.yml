version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: redspecter-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redspecter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:alpine
    container_name: redspecter-cache
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: redspecter-api
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/redspecter?schema=public
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=supersecret_redspecter_dev_key_123!
      - NODE_ENV=development
    depends_on:
      - db
      - cache

volumes:
  pgdata:
